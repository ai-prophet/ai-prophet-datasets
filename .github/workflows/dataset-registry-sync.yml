name: Dataset Registry Sync

on:
  pull_request:
    paths:
      - "datasets/**"
      - "registry.json"
      - "sdk/**"
      - ".github/workflows/dataset-registry-sync.yml"
  push:
    branches:
      - main
    paths:
      - "datasets/**"

permissions:
  contents: write

jobs:
  registry-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: pip install ./sdk

      - name: Validate datasets
        run: ai-prophet-datasets --repo-path . validate

      - name: Rebuild registry
        if: github.event_name == 'push'
        run: ai-prophet-datasets --repo-path . rebuild-registry

      - name: Commit registry changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet -- registry.json; then
            echo "No registry changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: auto-update registry"
          git push
